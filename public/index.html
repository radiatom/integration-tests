<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1.0, user-scalable=0"
    />
    <meta name="tiktok-ads-preloading-nocache" content="1" />
    <meta name="theme-color" content="#FFFFFF" />
    <title>Fit4Me App</title>
    <meta
      name="description"
      content="Discover Your Ideal Diet and Exercise Routine with This Personality Quiz."
    />
    <link rel="icon" href="%PUBLIC_URL%/img/favicon.svg" />
    <link rel="shortcut icon" href="%PUBLIC_URL%/card.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Fit4Me" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/app/icons/icon-180x180.png" />
  </head>
  <body>
    <div id="root"></div>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker
            .register('sw.js')
            .then(
              function (registration) {
                // Registration was successful
                console.log(
                  'ServiceWorker registration successful with scope: ',
                  registration.scope,
                )
              },
              function (err) {
                // registration failed :(
                console.log('ServiceWorker registration failed: ', err)
              },
            )
            .catch(function (err) {
              console.log(err)
            })
        })
      } else {
        console.log('service worker is not supported')
      }
    </script>
  </body>
</html>
